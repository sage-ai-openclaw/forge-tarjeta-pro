<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta Pro - Promociones Bancarias</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>💳 Tarjeta Pro</h1>
      <p>Monitor inteligente de promociones bancarias en Paraguay</p>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" onclick="showTab('promotions')">Promociones</button>
      <button class="tab-btn" onclick="showTab('scraper')">Scraper</button>
      <button class="tab-btn" onclick="showTab('banks')">Bancos</button>
    </nav>

    <section id="promotions" class="tab-content active">
      <div class="filters">
        <input type="text" id="searchInput" placeholder="Buscar promociones...">
        <select id="bankFilter">
          <option value="">Todos los bancos</option>
        </select>
        <select id="categoryFilter">
          <option value="">Todas las categorias</option>
          <option value="Gastronomia">Gastronomia</option>
          <option value="Supermercados">Supermercados</option>
          <option value="Moda">Moda</option>
          <option value="Viajes">Viajes</option>
          <option value="Entretenimiento">Entretenimiento</option>
        </select>
      </div>
      <div id="promotionsList" class="promotions-grid"></div>
    </section>

    <section id="scraper" class="tab-content">
      <div class="scraper-controls">
        <h2>Control de Scrapers</h2>
        <div class="scraper-buttons">
          <button onclick="runScraper('all')" class="btn-primary">Ejecutar todos</button>
          <button onclick="runScraper('Itau')">Itau</button>
          <button onclick="runScraper('Continental')">Continental</button>
          <button onclick="runScraper('Sudameris')">Sudameris</button>
          <button onclick="runScraper('Atlas')">Atlas</button>
          <button onclick="runScraper('Vision')">Vision</button>
        </div>
        <div id="scraperResults"></div>
        <h3>Logs recientes</h3>
        <div id="scraperLogs"></div>
      </div>
    </section>

    <section id="banks" class="tab-content">
      <div id="banksList"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
